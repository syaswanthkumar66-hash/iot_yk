services:
  - type: web
    name: ykp-router
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SERVER_PRIVATE_KEY
        sync: false
      - key: SERVER_PUBLIC_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
